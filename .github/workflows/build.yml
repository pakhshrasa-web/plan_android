name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache

    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37

    - name: Set GCC as default compiler
      run: |
        sudo apt-get install -y gcc g++
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV
        echo "LD=g++" >> $GITHUB_ENV
        sudo ln -sf /usr/bin/gcc /usr/local/bin/cc
        sudo ln -sf /usr/bin/g++ /usr/local/bin/c++
        gcc --version

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Plan Android
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf
        version = 0.1
        requirements = python3,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests
        orientation = portrait
        fullscreen = 0

        [buildozer]
        log_level = 2
        warn_on_root = 1

        [buildozer:android]
        android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
        android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b
        android.api = 33
        android.minapi = 21
        android.ndk = 25b
        android.archs = armeabi-v7a
        android.permissions = INTERNET
        android.enable_androidx = True
        android.allow_backup = True
        android.unsafe_ssl = False
        android.presplash_color = #FFFFFF
        android.ignore_manifest = False

        android.debug = 0
        android.release = 1
        EOF

    - name: Build with Buildozer
      run: |
        echo "y" | buildozer -v android release
      env:
        CC: gcc
        CXX: g++
        LD: g++

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore keystore.jks \
          -alias myalias -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password -keypass password \
          -dname "CN=Plan Android, OU=Dev, O=Pakhshrasa, L=City, S=State, C=IR"

    - name: Convert AAB to Signed APK
      run: |
        # پیدا کردن فایل AAB
        AAB_FILE=$(find . -name "*.aab" -type f | head -n 1)
        echo "Found AAB: $AAB_FILE"
        
        # دانلود bundletool
        wget -q https://github.com/google/bundletool/releases/download/1.17.0/bundletool-all-1.17.0.jar -O bundletool.jar
        
        # تبدیل AAB به APK با امضا
        java -jar bundletool.jar build-apks \
          --bundle="$AAB_FILE" \
          --output=app.apks \
          --mode=universal \
          --ks=keystore.jks \
          --ks-pass=pass:password \
          --ks-key-alias=myalias \
          --key-pass=pass:password \
          --overwrite
        
        # استخراج APK
        unzip -o app.apks -d apk_output
        mkdir -p bin
        cp apk_output/universal.apk bin/app-release.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
