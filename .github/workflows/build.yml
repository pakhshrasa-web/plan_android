name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache

    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37

    # 🔥 بخش اصلاح شده برای حل مشکل Clang
    - name: Set GCC as default compiler
      run: |
        # نصب GCC اگر موجود نباشه
        sudo apt-get install -y gcc g++
        
        # تنظیم متغیرهای محیطی
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV
        echo "LD=g++" >> $GITHUB_ENV
        
        # ایجاد symlink برای اطمینان
        sudo ln -sf /usr/bin/gcc /usr/local/bin/cc
        sudo ln -sf /usr/bin/g++ /usr/local/bin/c++
        
        # نمایش نسخه برای تایید
        gcc --version

    - name: Build with Buildozer
      run: |
        echo "y" | buildozer -v android debug
      env:
        CC: gcc
        CXX: g++
        LD: g++

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: bin/*.apk
