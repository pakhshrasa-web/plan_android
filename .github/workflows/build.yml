name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk python3-pip git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
      - name: Install Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython
      - name: Build APK
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = فروش و ویزیت
          package.name = salesmanagement
          package.domain = org.salesmanagement
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf,json,db
          version = 1.0
          requirements = hostpython3==3.10.0,python3==3.10.0,kivy==2.1.0,kivymd==1.1.1,openpyxl,jdatetime,arabic-reshaper,python-bidi
          orientation = portrait
          fullscreen = 0
          android.api = 30
          android.minapi = 21
          android.sdk = 30
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
          android.enable_androidx = True
          android.allow_backup = True
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF
          yes | buildozer android debug
        timeout-minutes: 60
      - uses: actions/upload-artifact@v4
        with:
          name: App
          path: bin/*.apk
