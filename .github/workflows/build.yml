name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache

    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37

    - name: Set GCC as default compiler
      run: |
        sudo apt-get install -y gcc g++
        echo "CC=gcc" >> $GITHUB_ENV
        echo "CXX=g++" >> $GITHUB_ENV
        echo "LD=g++" >> $GITHUB_ENV
        sudo ln -sf /usr/bin/gcc /usr/local/bin/cc
        sudo ln -sf /usr/bin/g++ /usr/local/bin/c++
        gcc --version

    - name: Clean buildozer cache
      run: |
        rm -rf ~/.buildozer
        rm -rf bin/
        rm -rf .buildozer/

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Plan Android
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf
        version = 0.1
        requirements = python3==3.10.9,kivy==2.2.1,kivymd==1.1.1,pyjnius==1.6.1,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests
        orientation = portrait
        fullscreen = 0
        python3 = True

        [buildozer]
        log_level = 4
        warn_on_root = 1

        [buildozer:android]
        android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
        android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b
        android.ndk = 25b
        android.api = 33
        android.minapi = 21
        android.archs = armeabi-v7a, arm64-v8a

        android.permissions = INTERNET
        android.enable_androidx = True
        android.allow_backup = True
        android.unsafe_ssl = False
        android.presplash_color = #FFFFFF
        android.ignore_manifest = False

        android.gradle_version = 8.4

        android.manifest.extra = <application android:enableOnBackInvokedCallback="true" />

        android.debug = False
        android.release = True
        EOF

    - name: Build with Buildozer (Release Mode)
      run: |
        echo "y" | buildozer -v android release
      env:
        CC: gcc
        CXX: g++
        LD: g++

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: bin/*.apk
