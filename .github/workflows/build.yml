name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache
        sudo apt-get clean
    
    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Plan Android
        package.name = planandroid
        package.domain = org.pakhshrasa

        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas,ttf
        version = 0.1
        requirements = python3,kivy==2.1.0,kivymd==1.1.1,pyjnius==1.5.0,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests
        orientation = portrait
        fullscreen = 0
        python3 = True

        [buildozer]
        log_level = 4
        warn_on_root = 1

        [buildozer:android]
        android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
        android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r23b
        android.ndk = 23b
        android.api = 31
        android.minapi = 21
        android.archs = armeabi-v7a, arm64-v8a

        android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE
        android.enable_androidx = True
        android.allow_backup = True
        android.unsafe_ssl = False
        android.presplash_color = #FFFFFF
        android.ignore_manifest = False

        android.gradle_version = 7.4.0

        android.manifest.extra = <application android:enableOnBackInvokedCallback="true" />

        android.debug = False
        android.release = True
        EOF
        
        echo "✅ buildozer.spec created successfully"
        cat buildozer.spec
    
    - name: Clean buildozer cache
      run: |
        rm -rf ~/.buildozer
        rm -rf bin/
        rm -rf .buildozer/
    
    - name: Build with Buildozer (Release Mode)
      run: |
        echo "y" | buildozer -v android release
      env:
        ANDROID_NDK: /home/runner/.buildozer/android/platform/android-ndk-r23b
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
