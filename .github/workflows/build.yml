name: ساخت APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: دریافت کد
      uses: actions/checkout@v4
      
    - name: نصب پیشنیازها
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
        
    - name: نصب Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython
        
    - name: ساخت APK
      run: |
        # ساخت فایل buildozer.spec
        cat > buildozer.spec << 'EOF'
[app]
title = فروش و ویزیت
package.name = salesmanagement
package.domain = org.salesmanagement

source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,json,db

version = 1.0

requirements = hostpython3==3.10.0,python3==3.10.0,kivy==2.1.0,kivymd==1.1.1,openpyxl,jdatetime,arabic-reshaper,python-bidi

orientation = portrait
fullscreen = 0

android.api = 30
android.minapi = 21
android.sdk = 30
android.ndk = 25b
android.archs = armeabi-v7a

android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE

android.enable_androidx = True
android.allow_backup = True

[buildozer]
log_level = 2
warn_on_root = 1
EOF
        yes | buildozer android debug --verbose
      timeout-minutes: 60
        
    - name: آپلود APK
      uses: actions/upload-artifact@v4
      with:
        name: برنامه-فروش-ویزیت
        path: bin/*.apk
        if-no-files-found: error
        retention-days: 30
