name: Build Android APK (Release)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev \
          python3-pip
        sudo apt-get clean
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython virtualenv
    
    - name: Install python-for-android
      run: |
        pip install git+https://github.com/kivy/python-for-android.git@master
    
    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore keystore.jks \
          -alias myalias -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password -keypass password \
          -dname "CN=Plan Android, OU=Dev, O=Pakhshrasa, L=City, S=State, C=IR"
    
    - name: Build APK with p4a (Release)
      run: |
        p4a apk \
          --private . \
          --package=org.pakhshrasa.planandroid \
          --name="Plan Android" \
          --version=1.0.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,kivymd,pyjnius,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests \
          --android-api=31 \
          --ndk-api=21 \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --permission=INTERNET \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --release \
          --key-filename=keystore.jks \
          --key-alias=myalias \
          --key-store-password=password \
          --key-alias-password=password \
          --enable-onbackinvokedcallback
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: planandroid-*.apk
        retention-days: 30
        if-no-files-found: error
