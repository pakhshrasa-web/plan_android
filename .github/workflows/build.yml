name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_method:
        description: 'روش بیلد (buildozer یا p4a)'
        required: true
        default: 'buildozer'
        type: choice
        options:
          - buildozer
          - p4a

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential git zip unzip \
          autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake \
          libffi-dev libssl-dev wget \
          ccache
        sudo apt-get clean
    
    - name: Install Python packages
      run: |
        pip install -q buildozer cython==0.29.37
    
    - name: Build with Buildozer
      if: github.event.inputs.build_method == 'buildozer' || github.event_name == 'push'
      run: |
        echo "y" | buildozer -v android release
    
    - name: Build with p4a (Experimental)
      if: github.event.inputs.build_method == 'p4a'
      run: |
        pip install python-for-android==2024.1.21
        p4a apk \
          --private . \
          --package=org.pakhshrasa.planandroid \
          --name="Plan Android" \
          --version=1.0.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,kivymd,pyjnius,android,openpyxl,jdatetime,arabic-reshaper,python-bidi,requests \
          --android-api=31 \
          --ndk-api=21 \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --permission=INTERNET \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --debug \
          --enable-onbackinvokedcallback
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
